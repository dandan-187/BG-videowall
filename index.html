<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animated GIF Background</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
    }
    
    .background {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
    }
    
    .background img {
      width: 100%;
      height: 100%;
      object-fit: cover;           /* cover = fills screen, may crop */
      /* object-fit: contain; */   /* uncomment if you want full GIF visible without cropping */
      object-position: center;
      pointer-events: none;        /* clicks go through to content below */
    }
    
    .content {
      position: relative;
      z-index: 2;
      width: 100%;
      height: 100%;
      color: white;
      text-align: center;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      /* Optional: semi-transparent dark overlay so text is readable */
      background: rgba(0, 0, 0, 0.3);
    }
    
    h1 {
      font-size: 3rem;
      margin-bottom: 1rem;
      text-shadow: 0 0 10px rgba(0,0,0,0.8);
    }
    
    p {
      font-size: 1.3rem;
      max-width: 80%;
    }
  </style>
</head>
<body>

  <div class="background">
    <img src="http://localhost/last.gif" alt="animated background">
  </div>

  <div class="content">
    <h1>Welcome to My App</h1>
    <p>This GIF is now your moving background.<br>Put your buttons, text, or anything here.</p>
    
    <!-- Example: add your MIT App Inventor buttons/labels over this later if needed -->
  </div>

</body>
</html>
